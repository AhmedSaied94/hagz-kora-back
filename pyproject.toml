[tool.ruff]
target-version = "py312"
line-length = 100
src = ["apps", "config"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "DJ",  # flake8-django
    "S",   # flake8-bandit (security)
    "RUF", # ruff-specific
]
ignore = [
    "S101",  # assert used — fine in tests
    "S105",  # hardcoded password — false positives in settings keys
    "DJ001", # avoid null=True on string fields — we allow it on optional fields
]

[tool.ruff.lint.per-file-ignores]
"config/settings/*.py" = ["F403", "F405"]  # star imports in settings
"*/migrations/*.py" = ["E501", "RUF012"]   # long lines and mutable class attrs in auto-generated migrations
"*/tests/*.py" = ["S101", "S106"]

[tool.ruff.lint.isort]
known-third-party = ["django", "rest_framework", "rest_framework_simplejwt"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.local"
python_files = ["tests.py", "test_*.py", "*_tests.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--strict-markers --tb=short -q"
markers = [
    "unit: fast unit tests (no DB)",
    "integration: tests that hit the DB or Redis",
    "slow: tests that are slower than 1s",
]

[tool.coverage.run]
source = ["apps"]
omit = [
    "*/migrations/*",
    "*/tests/*",
    "*/admin.py",
    "manage.py",
]

[tool.coverage.report]
fail_under = 70  # raised incrementally as features are implemented (target: 80)
show_missing = true
